name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck and build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build contract bindings
        run: npm run build --workspace credport-contract

      - name: Build SDK
        run: npm run build --workspace credport

      - name: Build React package
        run: npm run build --workspace credport-react
